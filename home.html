<!DOCTYPE html>
<html>
<head>
    <title>Upload Image</title>
    <style>
        body { font-family: 'Segoe UI'; background: linear-gradient(135deg,#eef2f3,#d9e4f5); }
        .container { width: 500px; margin: 100px auto; background: white; padding: 30px; border-radius: 12px; text-align:center; }
        button { padding:10px 20px; background:#2c3e50; color:white; border:none; border-radius:6px; }
    </style>
</head>
<body>
<div class="container">
    <h2>📤 Upload Histopathology Image</h2>
    {% if error %}<p style="color:red">{{error}}</p>{% endif %}
    <form action="/upload" method="POST" enctype="multipart/form-data">
        <input type="file" name="image" required><br><br>
        <button type="submit">Next ➜ Clinical Data</button>
    </form>
</div>
</body>
</html>
